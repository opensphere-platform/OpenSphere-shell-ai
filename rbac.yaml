# AI Hub RBAC is split by responsibility.
# - ai-reader is read-only and safe for normal API projection.
# - ai-controller can reconcile OpenSphere-native resources.
# - ai-installer is intentionally unbound by default; bind only for setup/upgrade windows.
# - ai-admin is intentionally unbound by default; bind only for explicit break-glass operations.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-runtime
  namespace: opensphere-system
  labels:
    app.kubernetes.io/name: ai
    app.kubernetes.io/part-of: opensphere-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "pods/log", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["operatorgroups", "subscriptions", "installplans", "clusterserviceversions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["orchestrator.ai.opensphere.io"]
    resources: ["aiagents", "promptlibraries", "toolclaims", "agenttracepolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ai.foundation.opensphere.io"]
    resources: ["llmrouteclaims", "vectorretrievalclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeflow.org"]
    resources: ["notebooks"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["servingruntimes", "clusterservingruntimes", "inferenceservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["modelregistry.opendatahub.io"]
    resources: ["modelregistries"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["trustyai.opendatahub.io"]
    resources: ["trustyaiservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads", "clusterqueues", "localqueues", "resourceflavors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ray.io"]
    resources: ["rayclusters", "rayjobs", "rayservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines", "pipelineruns"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
    resources: ["datasciencepipelinesapplications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["backbone.opensphere.io"]
    resources: ["backboneclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ai.opensphere.io"]
    resources:
      - "aitrainingstacks"
      - "workbenchclaims"
      - "dataconnectionclaims"
      - "computebackendclaims"
      - "datasetclaims"
      - "trainingjobclaims"
      - "modelpromotionclaims"
      - "inferenceclaims"
      - "pipelineclaims"
      - "pipelinerunclaims"
      - "experimentclaims"
      - "executionclaims"
      - "artifactclaims"
      - "monitoringtargets"
      - "distributedworkloadclaims"
      - "openspherecomponentcatalogs"
      - "openspherecomponentversions"
      - "openspheresubscriptions"
      - "opensphereinstallplans"
      - "openspheredatascienceclusters"
    verbs: ["get", "list", "watch"]
  - apiGroups: ["eval.ai.opensphere.io"]
    resources: ["evaluationpolicies", "evaluationjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-controller
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["kubeflow.org"]
    resources: ["notebooks"]
    verbs: ["update", "patch"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["ray.io"]
    resources: ["rayjobs"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
    resources: ["datasciencepipelinesapplications"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["orchestrator.ai.opensphere.io"]
    resources: ["aiagents", "promptlibraries", "toolclaims", "agenttracepolicies"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["orchestrator.ai.opensphere.io"]
    resources: ["aiagents/status", "promptlibraries/status", "toolclaims/status", "agenttracepolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ai.foundation.opensphere.io"]
    resources: ["llmrouteclaims", "vectorretrievalclaims"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["ai.foundation.opensphere.io"]
    resources: ["llmrouteclaims/status", "vectorretrievalclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ai.opensphere.io"]
    resources:
      - "aitrainingstacks"
      - "workbenchclaims"
      - "dataconnectionclaims"
      - "computebackendclaims"
      - "datasetclaims"
      - "trainingjobclaims"
      - "modelpromotionclaims"
      - "inferenceclaims"
      - "pipelineclaims"
      - "pipelinerunclaims"
      - "experimentclaims"
      - "executionclaims"
      - "artifactclaims"
      - "monitoringtargets"
      - "distributedworkloadclaims"
      - "openspheresubscriptions"
      - "opensphereinstallplans"
      - "openspheredatascienceclusters"
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["ai.opensphere.io"]
    resources:
      - "workbenchclaims/status"
      - "dataconnectionclaims/status"
      - "computebackendclaims/status"
      - "datasetclaims/status"
      - "trainingjobclaims/status"
      - "pipelineclaims/status"
      - "pipelinerunclaims/status"
      - "experimentclaims/status"
      - "executionclaims/status"
      - "artifactclaims/status"
      - "inferenceclaims/status"
      - "modelpromotionclaims/status"
      - "monitoringtargets/status"
      - "distributedworkloadclaims/status"
      - "openspheresubscriptions/status"
      - "opensphereinstallplans/status"
      - "openspheredatascienceclusters/status"
    verbs: ["get", "update", "patch"]
  - apiGroups: ["backbone.opensphere.io"]
    resources: ["backboneclaims"]
    verbs: ["create", "update", "patch"]
  - apiGroups: ["eval.ai.opensphere.io"]
    resources: ["evaluationpolicies", "evaluationjobs"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["eval.ai.opensphere.io"]
    resources: ["evaluationpolicies/status", "evaluationjobs/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-installer
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "update", "patch"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["operatorgroups", "subscriptions"]
    verbs: ["create", "update", "patch"]
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["create", "update", "patch"]
  - apiGroups: ["backbone.opensphere.io"]
    resources: ["backboneclaims"]
    verbs: ["create", "update", "patch"]
  - apiGroups: ["ai.opensphere.io"]
    resources:
      - "openspherecomponentcatalogs"
      - "openspherecomponentversions"
      - "openspheresubscriptions"
      - "opensphereinstallplans"
      - "openspheredatascienceclusters"
    verbs: ["create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-admin
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-credential-reader
  namespace: opensphere-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "oah-external-gpu-credentials"
      - "ai-hub-backbone-postgres"
      - "oah-dspa-postgres"
      - "ai-hub-backbone-rustfs"
      - "ai-hub-kserve-s3"
      - "ds-pipelines-proxy-tls-oah-dspa"
      - "ds-pipelines-envoy-proxy-tls-oah-dspa"
      - "opensphere-wildcard-tls"
      - "shell-service-token"
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-support-service-writer
  namespace: opensphere-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "ai-hub-kserve-s3"
      - "ds-pipelines-proxy-tls-oah-dspa"
      - "ds-pipelines-envoy-proxy-tls-oah-dspa"
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    resourceNames:
      - "ai-runtime"
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-reader-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-reader
subjects:
  - kind: ServiceAccount
    name: ai-runtime
    namespace: opensphere-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-support-service-writer-system
  namespace: opensphere-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-support-service-writer
subjects:
  - kind: ServiceAccount
    name: ai-runtime
    namespace: opensphere-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-controller-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-controller
subjects:
  - kind: ServiceAccount
    name: ai-runtime
    namespace: opensphere-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-credential-reader-system
  namespace: opensphere-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-credential-reader
subjects:
  - kind: ServiceAccount
    name: ai-runtime
    namespace: opensphere-system

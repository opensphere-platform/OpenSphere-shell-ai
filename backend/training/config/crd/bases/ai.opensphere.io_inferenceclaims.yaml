---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: inferenceclaims.ai.opensphere.io
spec:
  group: ai.opensphere.io
  names:
    kind: InferenceClaim
    listKind: InferenceClaimList
    plural: inferenceclaims
    shortNames:
    - infer
    singular: inferenceclaim
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InferenceClaim 은 승인된 모델 serving endpoint 선언 CR 이다.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InferenceClaimSpec 는 승인된 모델 serving endpoint 선언이다.
            properties:
              modelRef:
                description: ObjectRef 는 OpenSphere CR 참조다.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              promotionRef:
                description: PromotionRef 는 production/staging 배포를 허용한 ModelPromotionClaim
                  참조다.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              runtime:
                description: Runtime 은 kserve, vllm 같은 serving runtime 이다.
                enum:
                - kserve
                - vllm
                type: string
              backend:
                description: Backend selects auto, OpenSphere native fallback, or an upstream serving backend.
                enum:
                - auto
                - opensphere
                - native
                - fallback
                - kubernetes
                - internal
                - upstream
                - kserve
                type: string
              backendMode:
                description: BackendMode is accepted as an alias for Backend for UI and API compatibility.
                enum:
                - auto
                - opensphere
                - native
                - fallback
                - kubernetes
                - internal
                - upstream
                - kserve
                type: string
              backendType:
                description: BackendType is accepted as an alias for Backend for create forms and automation.
                enum:
                - auto
                - opensphere
                - native
                - fallback
                - kubernetes
                - internal
                - upstream
                - kserve
                type: string
              modelUri:
                description: ModelURI is the model artifact URI used by KServe storageUri.
                type: string
              storageUri:
                description: StorageURI is the KServe-compatible alias for ModelURI.
                type: string
              artifactUri:
                description: ArtifactURI is an alternate model artifact URI accepted by OAH.
                type: string
              source:
                description: Source is a compact alias for model artifact URI.
                type: string
              modelFormat:
                description: ModelFormat is the KServe model format name, such as sklearn or pytorch.
                type: string
              servingRuntime:
                description: ServingRuntime points to a KServe ServingRuntime when upstream serving is selected.
                type: string
              runtimeImage:
                description: RuntimeImage overrides the OpenSphere-native fallback image.
                type: string
              servingImage:
                description: ServingImage is accepted as an alias for RuntimeImage.
                type: string
              image:
                description: Image is accepted as a compact runtime image alias.
                type: string
              serviceAccountName:
                description: ServiceAccountName is passed to KServe predictor when required for storage credentials.
                type: string
              computeBackendRef:
                description: ComputeBackendRef lets OAH route native serving fallback to a registered compute backend.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            required:
            - modelRef
            - promotionRef
            type: object
          status:
            description: ClaimStatus 는 AI training lifecycle claim 공통 상태다.
            x-kubernetes-preserve-unknown-fields: true
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                type: string
              ready:
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

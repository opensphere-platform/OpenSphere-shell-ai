---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: aitrainingstacks.ai.opensphere.io
spec:
  group: ai.opensphere.io
  names:
    kind: AITrainingStack
    listKind: AITrainingStackList
    plural: aitrainingstacks
    shortNames:
    - ait
    singular: aitrainingstack
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AITrainingStack 은 AI MLOps/Training substrate CR 이다.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AITrainingStackSpec 는 AI MLOps/Training substrate 선언이다.

              D-2 운영 plane 신설(arch-001 §7 step 7):
              KServe+vLLM(서빙, ADR-070) · MLflow(lineage, ADR-071) · Feast(feature store, ADR-082)
              · TrustyAI(bias/drift 게이트, ADR-072)

              ai-eval(golden-set CI 게이트) 과 역할 경계:
                - ai-eval: 배포 전 golden-set 검증 (CI gate)
                - TrustyAI(여기): 런타임 bias/drift/eval 모니터링
            properties:
              featureStore:
                description: FeatureStore 는 Feast feature store 설정이다 (ADR-082).
                properties:
                  enabled:
                    default: false
                    description: Enabled=true 면 Feast 를 배포한다.
                    type: boolean
                type: object
              lineage:
                description: Lineage 는 MLflow 실험 추적 설정이다 (ADR-071).
                properties:
                  artifactStore:
                    description: ArtifactStore 는 MLflow artifact 저장소 (RustFS S3).
                    type: string
                  enabled:
                    default: false
                    description: Enabled=true 면 MLflow 를 배포한다.
                    type: boolean
                type: object
              serving:
                description: Serving 은 모델 서빙 설정이다 (KServe + vLLM).
                properties:
                  enabled:
                    default: false
                    description: Enabled=true 면 KServe 를 배포한다.
                    type: boolean
                  vllmRuntime:
                    default: false
                    description: vLLM=true 면 vLLM 런타임을 등록한다.
                    type: boolean
                type: object
              trustyAI:
                description: TrustyAI 는 runtime bias/drift 모니터링 설정이다 (ADR-072).
                properties:
                  biasThreshold:
                    description: BiasThreshold 는 bias 알람 임계값이다 (0.0~1.0).
                    type: number
                  enabled:
                    default: false
                    description: Enabled=true 면 TrustyAI 를 배포한다.
                    type: boolean
                type: object
            type: object
          status:
            description: AITrainingStackStatus 는 AI Training 스택 상태다.
            properties:
              conditions:
                description: Conditions 는 상태 조건이다.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              mlflowEndpoint:
                description: MLflowEndpoint 는 MLflow UI/API 엔드포인트다.
                type: string
              ready:
                description: Ready=true 면 전체 스택 준비 완료.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: ai
  namespace: opensphere-system
spec:
  kind: subShell
  hostRef: main
  hostApiVersion: "1.0.0"
  hostCompat: ">=1.0.0 <2.0.0"
  displayName: "OpenSphere AI Hub"
  owner: platform-experience
  version: 0.1.0
  description: "OpenSphere AI Hub operations dashboard"
  serviceAccountName: ai-runtime
  podLabels:
    pipelines.kubeflow.org/v2_component: "true"
  env:
    - name: OSP_ADMIN_GROUPS
      value: "opensphere-console-admins,opensphere-admins,system:masters,cluster-admins"
    - name: KANIDM_JWKS_URL
      value: "https://kanidm.opensphere-console-auth.svc:8443/oauth2/openid/opensphere-console/public_key.jwk"
  image:
    repository: ai
    digest: sha256:b43bb8d6d39d97ea678cf895f2427451ab9fd5b4c643de23436d5d10d1f1bd4c
  nav:
    band: "Operate"
    label: "OpenSphere AI Hub"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "9317947886be172674bd5ce4a55a9e9c1ef663b06a9f1d541898ab8c9a1f3aab"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v1
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - page:register
    - api:proxy
  api:
    basePath: /api/plugins/ai
  contributions:
    page: { enabled: true }
    navigation: { enabled: false, mode: "none", reason: "OpenSphere AI Hub owns navigation inside its page" }
    api: { enabled: true, basePath: "/api/plugins/ai" }
    cli: { enabled: false, reason: "OpenSphere AI Hub CLI manifest is not published" }
    manual: { enabled: false, mode: "none", reason: "OpenSphere AI Hub Manual contribution is not published" }
    search: { enabled: false, mode: "none", reason: "OpenSphere AI Hub search contribution is not published" }
    notification: { enabled: false, frontend: false, backend: false, reason: "OpenSphere AI Hub notification contribution is not published" }
    observability: { enabled: false, logs: false, metrics: false, traces: false, reason: "OpenSphere AI Hub observability contract is not published" }
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: ai
  namespace: opensphere-system
spec:
  packageRef:
    name: ai
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: false
    exposeInNavigation: true
  approval:
    requestedBy: cmars
    reason: "OpenSphere AI Hub subShell dashboard deployment"

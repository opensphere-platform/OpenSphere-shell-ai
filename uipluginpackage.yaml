apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: ai
  namespace: opensphere-system
spec:
  displayName: "OpenSphere AI Hub"
  owner: platform-experience
  version: 0.1.0
  description: "OpenSphere AI Hub operations dashboard"
  serviceAccountName: ai-runtime
  podLabels:
    pipelines.kubeflow.org/v2_component: "true"
  env:
    - name: OSP_ADMIN_GROUPS
      value: "opensphere-console-admins,opensphere-admins,system:masters,cluster-admins"
    - name: KANIDM_JWKS_URL
      value: "https://kanidm.opensphere-console-auth.svc:8443/oauth2/openid/opensphere-console/public_key.jwk"
  image:
    repository: ghcr.io/opensphere-platform/ai
    digest: sha256:1b399ca73510d4b563235a578c601d26da5ef5e6b80e478f30085427d55b46cd
  nav:
    band: "Operate"
    label: "OpenSphere AI Hub"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "1dd84465b6aeaf9fc2e590931496797786f9d50b73700309dd7f9b457ff6891e"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v1
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - page:register
    - api:proxy
  api:
    basePath: /api/plugins/ai
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: ai
  namespace: opensphere-system
spec:
  packageRef:
    name: ai
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: false
    exposeInNavigation: true
  approval:
    requestedBy: cmars
    reason: "OpenSphere AI Hub subShell dashboard deployment"

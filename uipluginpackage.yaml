apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: ai
  namespace: opensphere-system
spec:
  kind: subShell
  hostRef: main
  hostApiVersion: "1.0.0"
  hostCompat: ">=1.0.0 <2.0.0"
  displayName: "OpenSphere AI Hub"
  owner: platform-experience
  version: 1.0.0
  description: "CONSTITUTION-0003 Production subShell reference for OpenSphere AI operations"
  serviceAccountName: ai-runtime
  podLabels:
    pipelines.kubeflow.org/v2_component: "true"
  env:
    - name: OSP_ADMIN_GROUPS
      value: "opensphere-console-admins,opensphere-admins,system:masters,cluster-admins"
    - name: KANIDM_JWKS_URL
      value: "https://opensphere-auth.opensphere-console-auth.svc:8443/oauth2/openid/opensphere-console/public_key.jwk"
  image:
    repository: ai
    digest: sha256:a65af5151f049ad3b1dbd070a2f7a05d89779226f8736814170ba11d32a9e613
  nav:
    band: "Operate"
    label: "OpenSphere AI Hub"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "fd2039f2e852d9d70e345f2d33bf1edc9ab2d8202fbbf458025bba6df9dd177b"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v1
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - page:register
    - api:proxy
    - nav:contribute
    - search:contribute
    - notify:publish
  api:
    basePath: /api/plugins/ai
  cli:
    namespace: ai
    manifestPath: /admin/native/agent-tools
  contributions:
    page: { enabled: true }
    navigation: { enabled: true, mode: "runtime" }
    api: { enabled: true, basePath: "/api/plugins/ai" }
    cli: { enabled: true, namespace: "ai", manifestPath: "/admin/native/agent-tools" }
    manual: { enabled: true, sourceId: "plugin:ai", mode: "install-time" }
    search: { enabled: true, mode: "runtime" }
    notification: { enabled: true, frontend: true, backend: true }
    observability: { enabled: true, logs: true, metrics: true, traces: true }
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: ai
  namespace: opensphere-system
spec:
  packageRef:
    name: ai
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: false
    exposeInNavigation: true
  approval:
    requestedBy: cmars
    reason: "CONSTITUTION-0003 Production subShell reference deployment"
